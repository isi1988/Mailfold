name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Enforce coverage >= 80%
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}%"
          awk "BEGIN{ exit !(${total} >= 80) }" || { echo "::error::coverage ${total}% is below the 80% threshold"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  sonar:
    name: SonarQube quality gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history gives SonarQube accurate new-code / blame data.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.mod

      - name: Generate coverage for Sonar
        run: cd backend && go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v4
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      # Poll the compute-engine task from the scan, then assert the project's
      # quality gate is green. Implemented inline (rather than via the official
      # action) so it can retry through transient API hiccups on the server.
      - name: SonarQube quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          report=backend/.scannerwork/report-task.txt
          ceTaskId=$(grep '^ceTaskId=' "$report" | cut -d= -f2)
          echo "CE task: $ceTaskId"
          analysisId=""
          for i in $(seq 1 30); do
            resp=$(curl -sS -u "$SONAR_TOKEN:" "$SONAR_HOST_URL/api/ce/task?id=$ceTaskId" || true)
            status=$(printf '%s' "$resp" | python3 -c 'import sys,json;print(json.load(sys.stdin)["task"]["status"])' 2>/dev/null || echo PENDING)
            echo "attempt $i: status=$status"
            case "$status" in
              SUCCESS) analysisId=$(printf '%s' "$resp" | python3 -c 'import sys,json;print(json.load(sys.stdin)["task"].get("analysisId",""))') ; break ;;
              FAILED|CANCELED) echo "::error::analysis $status"; exit 1 ;;
            esac
            sleep 5
          done
          if [ -z "$analysisId" ]; then echo "::error::analysis did not finish in time"; exit 1; fi
          gate=$(curl -sS -u "$SONAR_TOKEN:" "$SONAR_HOST_URL/api/qualitygates/project_status?analysisId=$analysisId" | python3 -c 'import sys,json;print(json.load(sys.stdin)["projectStatus"]["status"])')
          echo "Quality gate: $gate"
          [ "$gate" = "OK" ] || { echo "::error::quality gate is $gate"; exit 1; }

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          working-directory: backend

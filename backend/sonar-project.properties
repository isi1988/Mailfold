sonar.projectKey=mailfold
sonar.projectName=Mailfold
sonar.host.url=https://sonar.team26.ru

# Analyze the Go backend from its module root.
sonar.sources=.
sonar.exclusions=**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage (the entry point and the bootstrap wiring in package app are
# process orchestration, excluded from the coverage ratio).
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=**/cmd/**,**/app/**

sonar.sourceEncoding=UTF-8
